name: Career Ops Scan

on:
  schedule:
    # Every hour — pairs with r3600 LinkedIn filter for near-real-time alerts.
    # Free tier usage: ~1.5 min/run × 24/day × 30 days ≈ 1,080 min/month
    # (GitHub free tier = 2,000 min/month for private repos — safely within limit)
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run ATS + LinkedIn scan
        id: scan
        env:
          SKIP_LINKEDIN: '0'
          SKIP_INSTAHYRE: '1'
        run: |
          node scan.mjs 2>&1 | tee scan-output.txt

          ADDED=$(grep -oP '(?<=New offers added:\s{6})\d+' scan-output.txt || echo "0")
          echo "added=$ADDED" >> $GITHUB_OUTPUT

          if [[ "$ADDED" -gt 0 ]]; then
            SUMMARY=$(grep -A 999 'New offers:' scan-output.txt \
              | grep '^\s*+' \
              | head -10 \
              | sed 's/^\s*+\s*/• /')
            echo "summary<<EOF" >> $GITHUB_OUTPUT
            echo "$SUMMARY" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Fix LinkedIn labels
        if: steps.scan.outputs.added > 0
        run: node fix-linkedin-labels.mjs 2>&1 | tail -5

      - name: Commit results
        run: |
          git config user.name  "career-ops-bot"
          git config user.email "bot@career-ops.local"
          git add data/pipeline.md data/scan-history.tsv || true
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            ADDED="${{ steps.scan.outputs.added }}"
            DATE=$(date +%Y-%m-%d)
            git commit -m "scan: $DATE — $ADDED new jobs"
            git push
          fi

      - name: Notify via Telegram
        if: steps.scan.outputs.added > 0
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          ADDED="${{ steps.scan.outputs.added }}"
          SUMMARY="${{ steps.scan.outputs.summary }}"
          DATE=$(TZ=Asia/Kolkata date '+%d %b %Y, %I:%M %p IST')

          MSG="🎯 *${ADDED} new PM jobs* — ${DATE}

${SUMMARY}

[View pipeline →](https://github.com/${{ github.repository }}/blob/main/data/pipeline.md)"

          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "parse_mode=Markdown" \
            --data-urlencode "text=${MSG}" \
            -o /dev/null

      - name: Upload scan log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-log-${{ github.run_id }}
          path: scan-output.txt
          retention-days: 7
