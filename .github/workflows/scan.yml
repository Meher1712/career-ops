name: Career Ops Scan

on:
  schedule:
    # Every hour, IST daytime only: UTC 03–16 = IST 08:30 – 21:30
    # Minute 17 (not :00) — GitHub's free-tier scheduler congests on the hour
    # and drops/delays runs; off-the-hour slots fire far more reliably.
    # Free tier: ~1.5 min/run x 14/day x 30 days ≈ 630 min/month (limit: 2,000)
    - cron: '17 3-16 * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Run ATS + LinkedIn scan
        id: scan
        env:
          SKIP_LINKEDIN: '0'
          SKIP_INSTAHYRE: '1'
        run: |
          node scan.mjs 2>&1 | tee scan-output.txt
          ADDED=$(node -e "try{const j=JSON.parse(require('fs').readFileSync('new-jobs.json','utf-8'));process.stdout.write(String(j.length));}catch(e){process.stdout.write('0');}" 2>/dev/null || echo "0")
          echo "added=$ADDED" >> $GITHUB_OUTPUT

      - name: Fix LinkedIn labels
        if: steps.scan.outputs.added > 0
        run: node fix-linkedin-labels.mjs 2>&1 | tail -5

      - name: Commit results
        run: |
          git config user.name  "career-ops-bot"
          git config user.email "bot@career-ops.local"
          git add data/pipeline.md data/scan-history.tsv || true
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            DATE=$(date +%Y-%m-%d)
            git commit -m "scan: $DATE — ${{ steps.scan.outputs.added }} new jobs"
            git push
          fi

      - name: Notify via Telegram
        if: steps.scan.outputs.added > 0
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ADDED: ${{ steps.scan.outputs.added }}
          REPO: ${{ github.repository }}
        run: |
          DATE=$(TZ=Asia/Kolkata date '+%d %b %Y, %I:%M %p IST')
          PIPELINE_URL="https://github.com/${REPO}/blob/main/data/pipeline.md"
          JOB_LIST=$(node format-notification.mjs)
          MSG=$(printf "🎯 *%s new PM jobs* — %s\n\n%s\n\n[View all in pipeline →](%s)" "$ADDED" "$DATE" "$JOB_LIST" "$PIPELINE_URL")
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "parse_mode=Markdown" \
            --data-urlencode "text=${MSG}" \
            -o /dev/null

      - name: Commit bridge file
        if: steps.scan.outputs.added > 0
        run: |
          git config user.name  "career-ops-bot"
          git config user.email "bot@career-ops.local"
          git add data/last-notification-jobs.json
          if git diff --cached --quiet; then
            echo "Bridge file unchanged."
          else
            git commit -m "scan: update last-notification-jobs.json"
            git push
          fi

      - name: Upload scan log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-log-${{ github.run_id }}
          path: scan-output.txt
          retention-days: 7
