name: Career Ops Scan

on:
  schedule:
    # Every hour — pairs with r3600 LinkedIn filter for near-real-time alerts.
    # Free tier: ~1.5 min/run x 24/day x 30 days ≈ 1,080 min/month (limit: 2,000)
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Run ATS + LinkedIn scan
        id: scan
        env:
          SKIP_LINKEDIN: '0'
          SKIP_INSTAHYRE: '1'
        run: |
          node scan.mjs 2>&1 | tee scan-output.txt
          ADDED=$(grep -oP '(?<=New offers added:\s{6})\d+' scan-output.txt || echo "0")
          echo "added=$ADDED" >> $GITHUB_OUTPUT
          if [[ "$ADDED" -gt 0 ]]; then
            grep -A 999 'New offers:' scan-output.txt | grep '^\s*+' | head -10 | sed 's/^\s*+\s*/• /' > new-jobs.txt
          else
            touch new-jobs.txt
          fi

      - name: Fix LinkedIn labels
        if: steps.scan.outputs.added > 0
        run: node fix-linkedin-labels.mjs 2>&1 | tail -5

      - name: Commit results
        run: |
          git config user.name  "career-ops-bot"
          git config user.email "bot@career-ops.local"
          git add data/pipeline.md data/scan-history.tsv || true
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            DATE=$(date +%Y-%m-%d)
            git commit -m "scan: $DATE — ${{ steps.scan.outputs.added }} new jobs"
            git push
          fi

      - name: Notify via Telegram
        if: steps.scan.outputs.added > 0
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ADDED: ${{ steps.scan.outputs.added }}
          REPO: ${{ github.repository }}
        run: |
          DATE=$(TZ=Asia/Kolkata date '+%d %b %Y, %I:%M %p IST')
          SUMMARY=$(cat new-jobs.txt)
          PIPELINE_URL="https://github.com/${REPO}/blob/main/data/pipeline.md"
          MSG=$(printf "🎯 *%s new PM jobs* — %s\n\n%s\n\n[View pipeline →](%s)" "$ADDED" "$DATE" "$SUMMARY" "$PIPELINE_URL")
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "parse_mode=Markdown" \
            --data-urlencode "text=${MSG}" \
            -o /dev/null

      - name: Upload scan log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-log-${{ github.run_id }}
          path: scan-output.txt
          retention-days: 7
