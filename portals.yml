# Portal Scanner Configuration
# Used by /career-ops scan to discover new offers automatically.
#
# Strategy (3 levels):
#   1. Playwright → careers_url of each company (real-time, reliable)
#   2. Greenhouse API → structured JSON (fast, Greenhouse-only)
#   3. WebSearch with site: filters (broad discovery, may be stale)
#
# IMPORTANT: Each company in tracked_companies MUST have careers_url.
#   Prefer the BRANDED company careers URL whenever available; use ATS-hosted URL only as fallback.
#   ✅ https://careers.mastercard.com   ⚠️ https://mastercard.wd1.myworkdayjobs.com (fallback only)
#   ✅ https://openai.com/careers       ⚠️ https://job-boards.greenhouse.io/openai (fallback only)
#   Exception: ATS-hosted careers_url is acceptable when no branded careers page exists.
#   Using raw ATS URLs when a branded page exists can cause false 410 errors (job ID mismatch).
#
# HOW TO CUSTOMIZE:
#   1. Copy this file to portals.yml in the project root
#   2. Edit title_filter.positive with YOUR target role keywords
#   3. Add/remove companies in tracked_companies
#   4. Adjust search_queries for your preferred job boards
#   5. Set enabled: false on companies you don't care about

# -- Location filter (optional) --
# Filter scanned jobs by location. Applied AFTER title filter, BEFORE dedup.
# If this entire block is absent, all locations pass (current default behavior).
#
# Semantics:
#   - Empty location string on a job → pass (don't penalize missing data)
#   - Any `block` keyword present → reject (takes precedence over allow)
#   - `allow` empty → pass (already cleared block)
#   - `allow` non-empty → must match at least one keyword
# All matches are case-insensitive substring.
#
# Example below targets US-based remote + a couple of US metros, blocking
# common foreign hubs. Customize to your geography.

location_filter:
  allow:
    - "India"
    - "Bengaluru"
    - "Bangalore"
    - "Mumbai"
    - "Delhi"
    - "New Delhi"
    - "Gurgaon"
    - "Gurugram"
    - "Noida"
    - "Hyderabad"
    - "Pune"
    - "Chennai"
    - "Kolkata"
    - "Ahmedabad"
    - "Remote"
    - "Anywhere"
    - "Work from home"
    - "WFH"
  block:
    - "United Kingdom only"
    - "US only"
    - "USA only"
    - "EU only"

# -- Title filter --
# The scanner uses these keywords to decide if a title is relevant.
# At least 1 positive must match AND 0 negatives must match (case-insensitive).

title_filter:
  positive:
    # Product Management roles (B2B SaaS PM transitioning to AI PM)
    - "Product Manager"
    - "Product Management"
    - "Senior Product Manager"
    - "Lead Product Manager"
    - "Principal Product Manager"
    - "Group Product Manager"
    - "Staff Product Manager"
    - "Director of Product"
    - "Head of Product"
    - "VP Product"
    - "VP of Product"
    - "Chief Product Officer"
    - "Product Owner"
    - "Technical PM"
    - "Technical Product Manager"
    - "Associate Product Manager"
    # AI / AI-adjacent product roles
    - "AI Product Manager"
    - "AI PM"
    - "ML Product Manager"
    - "LLM Product Manager"
    - "GenAI Product Manager"
    - "Generative AI Product"
    - "AI Product Owner"
    - "AI Product"
    - "Agent Product"
    - "Agentic Product"
    # Builder / Founding archetypes
    - "Founding Product Manager"
    - "Founding PM"
    - "Builder"
    - "Founding Member"
    - "Founder in Residence"
    - "Founding Team"
  negative:
    # Roles to exclude
    - "Intern"
    - "Internship"
    - "Junior"
    - "Trainee"
    - "Engineer"
    - "Developer"
    - "Designer"
    - "Data Scientist"
    - "Analyst"
    - "Marketing"
    - "Sales"
    - "Customer Success"
    - "Support"
    - "Recruiter"
    - "HR"
    - "Finance"
    - "Accountant"
    - "Salesforce Admin"
    - "SAP "
    - "Mainframe"
    - "COBOL"
  seniority_boost:
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "Head"
    - "Director"
    - "VP"
    - "Group"

# -- Search queries --
# Each query triggers a WebSearch. Use site: to filter by portal.
# The scanner extracts title, URL, and company from results.

search_queries:
  # Freshness:
  #   - `after:YYYY-MM-DD` filters Google to pages indexed since that date.
  #     Bump the date forward every couple of weeks to stay current.
  #   - Listings already seen are skipped via data/scan-history.tsv on every run.
  # Target: AI PM / Senior PM / Product Owner roles, India + Remote-from-India.

  # -- Ashby ATS --
  - name: Ashby - AI Product Manager (India)
    query: 'site:jobs.ashbyhq.com "AI Product Manager" OR "AI PM" OR "Senior Product Manager" India OR Bengaluru OR Bangalore OR Mumbai OR Remote after:2026-03-01'
    enabled: true

  - name: Ashby - Product Manager (India)
    query: 'site:jobs.ashbyhq.com "Product Manager" OR "Product Owner" India OR Bengaluru OR Gurgaon OR Remote after:2026-03-01'
    enabled: true

  # -- Greenhouse ATS --
  - name: Greenhouse - AI Product Manager (India)
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "AI Product Manager" OR "Senior Product Manager" India OR Bengaluru OR Mumbai OR Remote after:2026-03-01'
    enabled: true

  - name: Greenhouse - Product Manager (India)
    query: 'site:job-boards.greenhouse.io OR site:boards.greenhouse.io "Product Manager" OR "Product Owner" India OR Bengaluru OR Gurgaon OR Hyderabad after:2026-03-01'
    enabled: true

  # -- Lever ATS --
  - name: Lever - Product Manager (India)
    query: 'site:jobs.lever.co "Product Manager" OR "AI Product Manager" OR "Senior Product Manager" India OR Bengaluru OR Mumbai OR Remote after:2026-03-01'
    enabled: true

  # -- Workable ATS --
  - name: Workable - Product Manager (India)
    query: 'site:apply.workable.com "Product Manager" OR "AI Product Manager" India OR Bengaluru OR Remote after:2026-03-01'
    enabled: true

  # -- LinkedIn --
  - name: LinkedIn - AI PM (India)
    query: 'site:linkedin.com/jobs "AI Product Manager" OR "Senior Product Manager" India OR Bengaluru OR Mumbai OR Gurgaon after:2026-03-01'
    enabled: true

  - name: LinkedIn - Product Manager (India)
    query: 'site:linkedin.com/jobs "Product Manager" OR "Product Owner" Bengaluru OR Bangalore OR Mumbai OR Gurgaon OR Hyderabad after:2026-04-01'
    enabled: true

  # -- YC / Wellfound (startups, founding PM) --
  - name: YC Work at a Startup - Founding PM / AI PM
    query: 'site:workatastartup.com "Founding Product Manager" OR "Founding PM" OR "AI Product Manager" OR "Product Manager" India OR Remote after:2026-03-01'
    enabled: true

  - name: Wellfound - AI PM India
    query: 'site:wellfound.com "AI Product Manager" OR "Senior Product Manager" OR "Founding PM" India OR Bengaluru OR Remote after:2026-03-01'
    enabled: true

  # -- Indian job boards --
  - name: Instahyre - Senior PM / AI PM (India)
    query: 'site:instahyre.com "Senior Product Manager" OR "AI Product Manager" OR "Lead Product Manager" Bengaluru OR Mumbai OR Gurgaon OR Remote after:2026-03-01'
    enabled: true

  - name: Cutshort - Product Manager (India)
    query: 'site:cutshort.io "Product Manager" OR "AI Product Manager" Bengaluru OR Mumbai OR Gurgaon OR Hyderabad after:2026-03-01'
    enabled: true

  - name: Hirist - Senior PM (India)
    query: 'site:hirist.com "Senior Product Manager" OR "Lead Product Manager" OR "AI Product Manager" Bengaluru OR Mumbai OR Gurgaon after:2026-03-01'
    enabled: true

  - name: Naukri - AI PM / Senior PM (India)
    query: 'site:naukri.com "AI Product Manager" OR "Senior Product Manager" OR "Lead Product Manager" Bengaluru OR Mumbai OR Gurgaon OR Hyderabad after:2026-03-01'
    enabled: true

  # -- Remote-from-India aggregators --
  - name: Himalayas - Remote PM (India-friendly)
    query: 'site:himalayas.app "Product Manager" OR "AI Product Manager" OR "Senior Product Manager" India OR Remote OR APAC after:2026-03-01'
    enabled: true

  - name: RemoteOK - PM (Remote India)
    query: 'site:remoteok.com "Product Manager" OR "AI Product Manager" India OR Remote after:2026-03-01'
    enabled: true

  - name: Remotive - Product Manager
    query: 'site:remotive.com "Product Manager" OR "AI Product Manager" OR "Senior Product Manager" Remote OR Worldwide after:2026-03-01'
    enabled: true

  - name: WeWorkRemotely - Product Manager
    query: 'site:weworkremotely.com "Product Manager" OR "AI Product Manager" OR "Senior Product Manager" after:2026-03-01'
    enabled: true

  # -- HN Who's Hiring (filtered to India / Remote PM) --
  - name: HN Whos Hiring - PM India/Remote
    query: 'site:news.ycombinator.com OR site:hnrss.org "Product Manager" OR "AI PM" India OR Remote after:2026-03-01'
    enabled: true

# -- Tracked companies --
# Companies whose career pages are checked directly.
# scan_method: playwright (default), websearch, greenhouse_api
# For Greenhouse companies, add api: field for faster structured JSON access.
#
# Provider routing (scan.mjs):
#   By default each entry is auto-detected from `careers_url` against the
#   loaded providers in providers/*.mjs (ashby, greenhouse, lever — the
#   first one whose detect() matches wins, alphabetical order).
#
#   Optional fields on a tracked_companies entry:
#     provider: <id>     — force a specific provider, skipping detect().
#                          Useful when careers_url is ambiguous or you want
#                          to pin behavior. Value must match a loaded
#                          provider's `id`.
#     transport: http    — reserved for future transports. Defaults to http.

tracked_companies:

  # ==========================================================================
  # LinkedIn guest API — public, no auth, runs in cloud
  # time_filter: r3600=1h  r86400=24h  r604800=7d
  # ==========================================================================

  - name: LinkedIn India PM
    provider: linkedin
    keywords: "Product Manager"
    location: "India"
    time_filter: r3600    # past 1 hour — pairs with hourly GH Actions cron
    max_pages: 10
    enabled: true

  - name: LinkedIn India Senior PM
    provider: linkedin
    keywords: "Senior Product Manager"
    location: "India"
    time_filter: r3600
    max_pages: 5
    enabled: true

  # ==========================================================================
  # Indian large enterprises & listed
  # ==========================================================================

  - name: Flipkart
    careers_url: https://www.flipkartcareers.com/
    scan_method: websearch
    scan_query: 'site:flipkartcareers.com "Product Manager" OR "Product Owner"'
